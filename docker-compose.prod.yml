# This file is for REFERENCE only.
# In AWS, you'll use ECS Task Definitions instead of docker-compose.
# This shows the production configuration equivalent.

name: AI-explorer-prod
services:
  streamlit:
    build: ./
    container_name: Streamlit-AI-explorer
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AWS_REGION=${AWS_REGION}
      - SES_SENDER_EMAIL=${SES_SENDER_EMAIL}
      - DEBUG=false
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# NOTE: PostgreSQL runs as AWS RDS (managed service), not as a container.
# NOTE: Seeder runs as a one-time ECS task after RDS is ready.
